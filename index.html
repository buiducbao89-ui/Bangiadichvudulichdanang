<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Bảng giá các dịch vụ du lịch tại Đà Nẵng</title>

  <style>
    body { font-family: Arial; margin:0; background:#f6f6f6; }
    header { background:#0f172a; color:white; padding:20px; text-align:center; }
    .container { max-width:800px; margin:20px auto; padding:10px; }
    .video { background:white; margin-top:15px; padding:10px; }
    iframe { width:100%; height:400px; }
  </style>
</head>

<body>

<header>
  Bảng giá các dịch vụ du lịch tại Đà Nẵng
</header>

<div class="container" id="list"></div>

<script>
async function load(){
  const res = await fetch("./data.json");
  const data = await res.json();

  const list = document.getElementById("list");

  data.forEach(id => {
    const div = document.createElement("div");
    div.className = "video";
    div.innerHTML = `
      <iframe src="https://www.youtube.com/embed/${id}" allowfullscreen></iframe>
    `;
    list.appendChild(div);
  });
}

load();
</script>

</body>
</html>
