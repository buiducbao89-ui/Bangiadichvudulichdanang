<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bảng giá các dịch vụ du lịch tại Đà Nẵng</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f6f6;
      color: #222;
    }

    header {
      background: #0f172a;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 0 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      background: #2563eb;
      color: white;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #1d4ed8;
    }

    .video {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 8px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
    }
  </style>
</head>

<body>

<header>
  Bảng giá các dịch vụ du lịch tại Đà Nẵng
</header>

<div class="container">

  <input type="text" id="ytLink" placeholder="Dán link YouTube vào đây..." />
  <button onclick="addVideo()">Thêm video</button>

  <div id="videoList"></div>

</div>

<script>
function extractVideoId(url) {
  const regex = /(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;
  const match = url.match(regex);
  return match ? match[1] : null;
}

function addVideo() {
  const input = document.getElementById("ytLink");
  const url = input.value.trim();
  const videoId = extractVideoId(url);

  if (!videoId) {
    alert("Link YouTube không hợp lệ");
    return;
  }

  const iframe = `
    <div class="video">
      <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
    </div>
  `;

  document.getElementById("videoList").innerHTML += iframe;
  input.value = "";
}
</script>

</body>
</html>
